services:
  db:
    image: mysql:8.0
    container_name: tt-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tt_admin}
      MYSQL_USER: ${DB_USERNAME:-tt_admin}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/tt_admin.sql:/docker-entrypoint-initdb.d/001_tt_admin.sql:ro
      - ./sql/v2/002_migrate_sys_plugin_to_sys_extension.sql:/docker-entrypoint-initdb.d/002_migrate_sys_plugin_to_sys_extension.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: tt-admin-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: tt-admin-backend/Dockerfile
    container_name: tt-admin-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-tt_admin}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USE_SSL: ${DB_USE_SSL:-false}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./resources/themes:/app/resources/themes
      - ./tt-admin-backend/resources/plugins:/app/resources/plugins
      - ./tt-admin-backend/resources/temp:/app/resources/temp
      - backend_logs:/var/log/tt-admin

  frontend:
    build:
      context: .
      dockerfile: tt-admin-frontend/Dockerfile
    container_name: tt-admin-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_PORT:-9527}:80'
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
  backend_logs:
