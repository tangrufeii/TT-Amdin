renderer: web-component
i18n:
  zh-CN: i18n/zh-CN.json
  en-US: i18n/en-US.json
modules:
  - moduleName: plugin-demo
    routes:
      - name: plugin-demo-index
        path: /plugin-demo
        component: /view/PluginDemoView
        componentName: plugin-demo-index
        meta:
          title: 示例插件
          i18nKey: plugin.demo.title
          icon: mdi:puzzle
          order: 1
          hideInMenu: false
          keepAlive: true
          layout: base
      - name: plugin-demo-advanced
        path: /plugin-demo/advanced
        component: /view/PluginDemoAdvancedView
        componentName: plugin-demo-advanced
        meta:
          title: 示例进阶
          i18nKey: plugin.demo.advanced
          icon: mdi:puzzle-plus
          order: 2
          hideInMenu: false
          keepAlive: true
          layout: base
      - name: plugin-demo-ide
        path: /plugin-demo/ide
        component: /view/PluginDemoIdeView
        componentName: plugin-demo-ide
        meta:
          title: 在线 IDE
          i18nKey: plugin.demo.ide
          icon: mdi:code-braces
          order: 3
          hideInMenu: false
          keepAlive: true
          layout: base
menus:
  - routeName: plugin-demo-index
  - routeName: plugin-demo-advanced
  - routeName: plugin-demo-ide