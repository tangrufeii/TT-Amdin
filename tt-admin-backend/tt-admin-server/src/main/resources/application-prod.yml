# 生产环境配置

server:
  port: 8080

spring:
  # 生产环境数据源
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:tt_admin}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      auto-commit: true
      idle-timeout: 600000
      pool-name: DateSourceHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
# 生产环境日志
logging:
  level:
    root: warn
    com.modules: info
    com.tt: info
    org.springframework.web: warn
    org.springframework.security: warn
  file:
    name: /var/log/tt-admin/tt-admin.log
  logback:
    rolling-policy:
      max-file-size: 50MB
      max-history: 60

# 生产环境 Knife4j
knife4j:
  production: true
  enable: false
# 生产环境 Sa-Token
sa-token:
  is-log: false
