version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: tt-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tt_admin
      MYSQL_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: tt-admin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: tt-admin-backend/Dockerfile
    container_name: tt-admin-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: tt_admin
      DB_USERNAME: root
      DB_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    volumes:
      - plugin_data:/app/resources/plugins
      - plugin_temp:/app/resources/temp
      - backend_logs:/var/log/tt-admin

  frontend:
    build:
      context: .
      dockerfile: tt-admin-frontend/Dockerfile
    container_name: tt-admin-frontend
    restart: unless-stopped
    ports:
      - "9527:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  plugin_data:
  plugin_temp:
  backend_logs: