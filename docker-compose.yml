services:
  db:
    image: mysql:8.0
    container_name: tt-admin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tt_admin
      MYSQL_ROOT_PASSWORD: root
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/tt_admin.sql:/docker-entrypoint-initdb.d/001_tt_admin.sql:ro
      - ./sql/v2/002_migrate_sys_plugin_to_sys_extension.sql:/docker-entrypoint-initdb.d/002_migrate_sys_plugin_to_sys_extension.sql:ro

  redis:
    image: redis:7-alpine
    container_name: tt-admin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: tt-admin-backend/Dockerfile
    container_name: tt-admin-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: tt_admin
      DB_USERNAME: root
      DB_PASSWORD: root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    volumes:
      - ./tt-admin-backend/resources/plugins:/app/resources/plugins
      - ./tt-admin-backend/resources/temp:/app/resources/temp
      - backend_logs:/var/log/tt-admin

  frontend:
    build:
      context: .
      dockerfile: tt-admin-frontend/Dockerfile
    container_name: tt-admin-frontend
    restart: unless-stopped
    ports:
      - "9527:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_logs:
