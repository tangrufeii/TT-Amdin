services:
  frontend:
    ports: []

  gateway:
    image: caddy:2-alpine
    container_name: tt-admin-gateway
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - '80:80'
      - '443:443'
    environment:
      HTTPS_DOMAIN: ${HTTPS_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
