<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northline Goods</title>
    <link rel="stylesheet" href="/portal/theme-assets/shop/static/style.css" />
  </head>
  <body>
    <main class="shop-page">
      <header class="shop-nav">
        <a class="brand" href="/">Northline</a>
        <nav>
          <a href="#products">商品</a>
          <a href="#journal">指南</a>
          <a href="#service">服务</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero__copy">
          <p class="eyebrow">Field Ready Goods</p>
          <h1 data-role="title">Northline Goods</h1>
          <p data-role="subtitle">为日常通勤、露营和城市周末准备的轻量装备。</p>
          <a class="primary-link" href="#products">查看商品</a>
        </div>
        <div class="hero__visual" aria-hidden="true">
          <img src="/portal/theme-assets/shop/static/img/product-pack.svg" alt="" />
        </div>
      </section>

      <section id="products" class="products">
        <div class="section-head">
          <p class="eyebrow">Selected Products</p>
          <h2>本周精选</h2>
        </div>
        <div class="product-grid" data-role="products"></div>
      </section>

      <section id="journal" class="story-band">
        <div>
          <p class="eyebrow">Buying Notes</p>
          <h2>少一点装饰，多一点耐用。</h2>
        </div>
        <p>这套主题用于验证商城类门户：首屏品牌、商品列表、价格和标签都从公开接口读取。</p>
      </section>

      <section id="service" class="service-strip">
        <span>同域接口</span>
        <span>文件主题</span>
        <span>在线切换</span>
      </section>
    </main>
    <script src="/portal/theme-assets/shop/static/main.js"></script>
  </body>
</html>
