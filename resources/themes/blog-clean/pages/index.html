<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Notes</title>
    <link rel="stylesheet" href="/portal/theme-assets/blog-clean/static/style.css" />
  </head>
  <body>
    <main class="blog-page">
      <header class="blog-header">
        <a class="brand" href="/">Analog Notes</a>
        <nav>
          <a href="#latest">最新</a>
          <a href="#about">关于</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero__inner">
          <p class="eyebrow">Independent Journal</p>
          <h1 data-role="title">Analog Notes</h1>
          <p data-role="subtitle">记录产品、工程和生活方式里的清醒判断。</p>
        </div>
      </section>

      <section id="latest" class="latest">
        <div class="section-copy">
          <p class="eyebrow">Latest Essays</p>
          <h2>近期文章</h2>
        </div>
        <div class="article-list" data-role="articles"></div>
      </section>

      <section id="about" class="about">
        <p class="eyebrow">Theme Test</p>
        <h2>这个主题验证文章接口、封面图和文件式整站替换。</h2>
      </section>
    </main>
    <script src="/portal/theme-assets/blog-clean/static/main.js"></script>
  </body>
</html>
